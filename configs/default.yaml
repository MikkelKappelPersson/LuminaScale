# WebDataset training configuration (baseline)
# Usage: python scripts/train_dequantization_net.py --config-name=default

config_name: default

# Data paths
shard_path: "dataset/temp/shards/train"
val_shard_path: "dataset/temp/shards/val"
metadata_parquet: "dataset/temp/training_metadata.parquet"

# Training parameters
batch_size: 1
epochs: 50  
learning_rate: 1e-4  
checkpoint_freq: 50
resume_ckpt_path: null #/mnt/MKP01/med8_project/LuminaScale/outputs/training/20260412_143228/checkpoints/dequant-epoch=49.ckpt  # Path to checkpoint to resume from (e.g., outputs/training/20260412_143228/checkpoints/dequant-epoch=49.ckpt)

# Data loading
prefetch_size: 2
num_workers: 2
shuffle_buffer: 50  # Buffer size for shuffling individual samples (shardshuffle is automatic based on is_training)

# Hardware
device: cuda
accelerator: gpu
devices: auto
strategy: auto
precision: 16-mixed

# Output
output_dir: ./outputs/training

# Model
model:
  base_channels: 32

# Image processing
crop_size: 2048
val_crop_size: 1024  # Validation crop size (can differ from training for speed)
bit_crunch_contrast_min: 1.0   # Min bit-crunching factor (1.0 = no crunching, >1 = aggressive)
bit_crunch_contrast_max: 20.0   # Max bit-crunching factor (pre=1/factor, post=factor for symmetric crush/expand)

# Loss weights (tuned for smooth dequantization with Charbonnier smoothness)
loss:
  l1_weight: 1.0           # Pixel-wise reconstruction (base)
  l2_weight: 0.0           # L2 loss (MSE)
  charbonnier_weight: 0.0  # Charbonnier loss on OUTPUT (edge-preserving smoothness)
  grad_match_weight: 0.0   # Edge-aware smoothing (soft): no artifacts in smooth regions
  total_variation_weight: 0.0  # Total variation loss (gradient smoothing)
  total_variation_variant: "huber"  # Variant for TV loss: "huber" or "l2"

# Performance tuning
enable_profiling: false  # Disable CUDA synchronization calls by default (enables profiling when true)
enable_compile: false    # Disable torch.compile (requires CUDA headers and complex Triton setup). Training optimizations: use mixed precision (16-bit) and gradient checkpointing instead.

# Hydra configuration to suppress working directory change warning and .hydra/ folder
hydra:
  job:
    chdir: false
  run:
    dir: .  # Prevent Hydra from creating timestamped output directories
  output_subdir: null  # Disable .hydra/ subdirectory creation
