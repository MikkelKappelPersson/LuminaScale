# Local development configuration for dequantization training
# Usage: python scripts/train_dequantization_net.py --config-name=default

lmdb_path: ${oc.env:LMDB_PATH,./dataset/training_data.lmdb}
output_dir: ./checkpoints
batch_size: 8
epochs: 100
learning_rate: 1e-4
device: cuda
checkpoint_freq: 10
num_workers: 4
model:
  base_channels: 16
