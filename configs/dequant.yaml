# Entry config for Dequant training.
# Inherits global system defaults from config.yaml and applies dequant task params.

defaults:
  - config
  - _self_

# Dequantization specific parameters
model:
  base_channels: 32

# Training parameters
batch_size: 1
epochs: 20  
learning_rate: 1e-4  
checkpoint_freq: 5        # Checkpoint every 5 epochs
save_top_k: 3             # Keep best 3 performers (PSNR)
resume_ckpt_path: null #/mnt/MKP01/med8_project/LuminaScale/outputs/training/20260412_143228/checkpoints/dequant-epoch=49.ckpt  # Path to checkpoint to resume from (e.g., outputs/training/20260412_143228/checkpoints/dequant-epoch=49.ckpt)
precision: "32"

# Loss weights (tuned for smooth dequantization)
loss:
  l1_weight: 0.1
  l2_weight: 0.0
  charbonnier_weight: 0.0
  grad_match_weight: 0.0
  total_variation_weight: 0.0
  total_variation_variant: "huber"

# Target blurring for clean gradient learning
target_blur:
  start_sigma: 0.0      # Start with blur to focus on core gradients
  end_sigma: 0.0        # End on real images
  anneal_epochs: ${epochs}    # Gradually reduce blur over the full training duration

# Image processing specific to dequantization
crop_size: 2048
val_crop_size: 1024  # Validation crop size
bit_crunch_contrast_min: 1.0
bit_crunch_contrast_max: 1.0

# Output scoping
output_dir: ./outputs/training