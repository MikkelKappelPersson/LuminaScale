defaults:
  - default
  - _self_

config_name: dev

# Data paths
shard_path: "dataset/temp/shards/val"
epochs: 6

prefetch_size: 2
# Optimize throughput without multiple patches strategy

batch_size: 1          # Larger batch for better GPU utilization
num_workers: 2         # Optimal: minimizes GIL contention while maintaining I/O

# Loss weights (tuned for smooth dequantization with Charbonnier smoothness)
loss:
  l1_weight: 1.0           # Pixel-wise reconstruction (base)
  l2_weight: 0.0           # L2 loss (MSE)
  charbonnier_weight: 1.0  # Charbonnier loss on OUTPUT (edge-preserving smoothness)
  grad_match_weight: 0.0   # Edge-aware smoothing (soft): no artifacts in smooth regions
  total_variation_weight: 0.0  # Total variation loss (gradient smoothing)
  total_variation_variant: "huber"  # Variant for TV loss: "huber" or "l2"


crop_size: 2048
val_crop_size: 1024  # Faster validation with smaller crops
# Mixed precision (FP16 with automatic loss scaling) for faster GPU compute
precision: "16-mixed"

# Disable profiling CUDA synchronizations for maximum throughput
enable_profiling: true

# torch.compile disabled due to missing CUDA headers in Triton compilation
# Set to true to enable (requires proper CUDA development headers)
enable_compile: false

# Hydra configuration to suppress working directory change warning and .hydra/ folder
hydra:
  job:
    chdir: false
  run:
    dir: .  # Prevent Hydra from creating timestamped output directories
  output_subdir: null  # Disable .hydra/ subdirectory creation
