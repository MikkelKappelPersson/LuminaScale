# HPC Slurm-optimized configuration for dequantization training
# Usage: sbatch scripts/train_dequantization_net.sh

defaults:
  - default

# HPC-specific overrides
batch_size: 16  # Larger batches with more GPU memory
epochs: 200
learning_rate: 5e-5  # Slightly smaller LR for stability with larger batches
checkpoint_freq: 5  # More frequent checkpoints in long-running jobs
num_workers: 8  # More CPU workers for data loading

# Data paths (override in sbatch script or pass --srgb_dir /lustre/...)
lmdb_path: ${oc.env:LMDB_PATH,/lustre/scratch/fs62fb/dataset/training_data.lmdb}
output_dir: ${oc.env:OUTPUT_DIR,/lustre/scratch/fs62fb/checkpoints}
