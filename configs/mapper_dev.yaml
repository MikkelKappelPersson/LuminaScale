# Entry config for ACES Mapper training.
# Inherits global system defaults from config.yaml and applies mapper task params.

defaults:
  - mapper
  - _self_

epochs: 3  

shard_path: "dataset/dev/shards/train"  # Use test shards for quick dev runs
val_shard_path: "dataset/dev/shards/val"
metadata_parquet: "dataset/dev/training_metadata.parquet"

# Output scoping
output_dir: ./outputs/training/mapper