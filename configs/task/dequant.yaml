# @package _global_
task_name: dequant

# Data specific to dequantization
shard_path: "dataset/temp/shards/train"
val_shard_path: "dataset/temp/shards/val"

# Dequantization specific parameters
model:
  base_channels: 32

# Loss weights (tuned for smooth dequantization)
loss:
  l1_weight: 0.1
  l2_weight: 0.0
  charbonnier_weight: 0.0
  grad_match_weight: 100.0
  total_variation_weight: 0.0
  total_variation_variant: "huber"

# Target blurring for clean gradient learning
target_blur:
  start_sigma: 0.0      # Start with blur to focus on core gradients
  end_sigma: 0.0        # End on real images
  anneal_epochs: ${epochs}    # Gradually reduce blur over the full training duration

# Image processing specific to dequantization
crop_size: 2048
val_crop_size: 1024  # Validation crop size
bit_crunch_contrast_min: 1.0
bit_crunch_contrast_max: 1.0

# Output scoping
output_dir: ./outputs/dequant/training
