# @package _global_
task_name: mapper

# Model Configuration (SOTA-inspired Hybrid Mapper)
model:
  target: luminascale.models.aces_mapper.ACESMapper
  params:
    num_luts: 3
    lut_dim: 33
    num_lap: 3
    num_residual_blocks: 5
    sft_embed_dim: 64
    sft_depths: [1, 1, 1, 1, 1, 1, 1, 1]
    sft_num_heads: [2, 4, 8, 16, 16, 8, 4, 2]

# Lightning Trainer/Module params
trainer:
  module: luminascale.training.aces_trainer.ACESMapperTrainer
  params:
    lr: 1e-4
    weight_decay: 1e-4


# Output scoping
output_dir: ./outputs/mapper/training

# Image processing
crop_size: 1024

