# Small test configuration for debugging the training pipeline
# Usage: python scripts/train_dequantization_net.py --config-name=test

# Hydra configuration to avoid creating redundant timestamped folders in outputs/
hydra:
  run:
    dir: .   # This makes Hydra run in the current working directory
  output_subdir: null # This prevents Hydra from creating a .hydra subdirectory

# Explicitly define values
lmdb_path: /mnt/MKP01/med8_project/LuminaScale/dataset/training_data.lmdb
output_dir: ./outputs/training
batch_size: 8
epochs: 1
learning_rate: 1e-4
checkpoint_freq: 1
device: cuda
num_workers: 8
patches_per_image: 1
crop_size: 512
model:
  base_channels: 16
# TensorBoard logging is auto-enabled; view with:
# tensorboard --logdir=outputs/training/tensorboard
