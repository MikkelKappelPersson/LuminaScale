# Quick test configuration for async prefetch validation
# This is a minimal test to verify the async threading works
hydra:
  run:
    dir: .
  output_subdir: null

lmdb_path: /home/student.aau.dk/fs62fb/projects/LuminaScale/dataset/training_data.lmdb
output_dir: ./outputs/training
batch_size: 2  # Smaller for quick test
epochs: 1
learning_rate: 1e-4
checkpoint_freq: 1
device: cuda
accelerator: gpu
devices: 1  # Single GPU for quick test
strategy: auto
precision: 16-mixed
num_workers: 0
patches_per_image: 32
crop_size: 512

# ASYNC PREFETCH TEST
use_async_prefetch: true
prefetch_workers: 2
prefetch_queue_size: 2

model:
  base_channels: 16  # Smaller model for quick test
