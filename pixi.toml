[workspace]
authors = ["Mikkel Kappel Persson <mikkel@kappelpersson.dk>"]
channels = ["conda-forge"]
name = "LuminaScale"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
tensorboard = "python -m tensorboard.main --logdir=outputs/training --port=6008 --bind_all --load_fast=false"

[system-requirements]
cuda = "12.8"

[dependencies]
python = "3.12.*"
cuda-version = "==12.8"
hydra-core = ">=1.3.2,<2"
omegaconf = ">=2.3.0,<3"
scikit-image = ">=0.26.0,<0.27"
imageio = ">=2.37.0,<3"
tqdm = ">=4.67.3,<5"
nanobind = ">=2.12.0,<3"
matplotlib = ">=3.10.8,<4"
jupyter = ">=1.1.1,<2"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.2,<3"
pytorch-gpu = ">=2.7.1,<3"
torchvision = ">=0.22.0,<0.23"
pandas = ">=3.0.1,<4"
pillow = ">=12.1.1,<13"
tensorboard = ">=2.20.0,<3"
setuptools = "81.*"
torch-tb-profiler = ">=0.4.3,<0.5"
pytorch-lightning = ">=2.6.1,<3"
pytest = ">=9.0.2,<10"
triton = ">=3.3.0,<4"


[pypi-dependencies]
openimageio = ">=3.1.11.0, <4"
opencolorio = ">=2.5.1, <3"
antlr4-python3-runtime = ">=4.9.3, <5"
webdataset = ">=0.2.118"
pyarrow = ">=15.0.0"
fastparquet = ">=2024.2.0"


